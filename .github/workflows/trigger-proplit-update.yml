name: Trigger PropLit Update

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  trigger-update:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger update-decisions in Harrison-Riddle/PropLit
        env:
          TARGET_OWNER: Harrison-Riddle
          TARGET_REPO: PropLit
          TARGET_WORKFLOW: update-decisions.yml
          GH_TOKEN: ${{ secrets.PROPLIT_TRIGGER_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW}/dispatches \
            -d '{"ref":"main"}'
